name: Theia Compatibility

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.vscode/**'
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 8 AM UTC

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        theia_version: [1.66.0, 1.71.2, latest]
    env:
      GLSP_REPO_DIR: '${{ github.workspace }}'
      GLSP_SERVER_PORT: '8081'
      GLSP_WEBSOCKET_PATH: 'workflow'
      GLSP_SERVER_DEBUG: 'true'
      GLSP_SERVER_TYPE: 'node'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: 'glsp-theia-integration'
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: 'eclipse-glsp/glsp-playwright'
          path: 'glsp-playwright'
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: 'eclipse-glsp/glsp-server-node'
          path: 'glsp-server-node'
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: glsp-theia-integration/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: glsp-theia-integration/pnpm-lock.yaml
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
      - name: Build
        run: |
          cd glsp-theia-integration
          pnpm compile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # https://github.com/microsoft/vscode-ripgrep/issues/9
      - name: Change theia version
        run: |
          cd glsp-theia-integration
          pnpm change:theia-version ${{ matrix.theia_version }}
      # Reinstall to apply the downgrade. Must run before `electron build` so theia's native
      # module backup/restore (.browser_modules) operates on the correctly downgraded tree.
      - name: Install downgraded dependencies
        run: |
          cd glsp-theia-integration
          pnpm install --no-frozen-lockfile
          pnpm compile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # https://github.com/microsoft/vscode-ripgrep/issues/9
      - name: Build electron
        run: |
          cd glsp-theia-integration
          pnpm electron build
        env:
          NODE_OPTIONS: --max_old_space_size=4096
      - name: Build browser
        run: |
          cd glsp-theia-integration
          pnpm install --no-frozen-lockfile
          pnpm compile
          pnpm browser build
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # https://github.com/microsoft/vscode-ripgrep/issues/9
      - name: Build Playwright
        run: |
          cd glsp-playwright
          pnpm glsp repo playwright build
      - name: Build GLSP Server Node
        run: |
          cd glsp-server-node
          pnpm glsp repo server-node build

      - name: Run Playwright tests
        id: run_playwright_tests
        run: |
          cd glsp-playwright
          pnpm glsp repo playwright run test:theia
      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report-compat-${{ matrix.theia_version }}
          path: glsp-playwright/examples/workflow-test/playwright-report/
